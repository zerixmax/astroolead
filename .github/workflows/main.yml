name: OleaD Production Deployment (CI/CD)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build Astro with Rust Compiler & Deploy via FTPS
    runs-on: ubuntu-latest

    steps:
      # 1. Povlačenje koda iz repozitorija
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Postavljanje Node.js okruženja
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-node: 20
          cache: 'npm'

      # 3. Instalacija zavisnosti (dependencies)
      - name: Install dependencies
        run: npm ci

      # 4. Pokretanje produkcijskog builda (Astro Rust compiler-rs)
      - name: Build project
        run: npm run build

      # 5. Sinkronizacija i slanje generiranih datoteka na cPanel poslužitelj putem FTPS-a
      - name: FTP Deploy to public_html
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.oleadigitalis.eu
          username: astro@oleadigitalis.eu
          password: ${{ ctlpE++KVG}@cxb; }}
          port: 21
          local-dir: ./dist/
          server-dir: ./
          protocol: ftps
